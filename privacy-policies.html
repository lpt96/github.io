<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Privacy Policies — LPT Studio</title>
<script>
  // Runs immediately, before the page paints, to avoid a flash of the wrong theme.
  // Defaults to the visitor's system preference unless they've picked a theme before.
  (function(){
    try {
      const saved = localStorage.getItem('lpt-theme');
      const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = saved || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    } catch(e) { /* if storage is blocked, just fall back to the default light theme */ }
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #fafafa;
    --ink: #0a0a0f;
    --ink-soft: #8a8f98;
    --line: #e4e4e7;
    --accent: #2e5eff;
    --accent-soft: rgba(46,94,255,0.07);
    --card: #ffffff;
  }

  :root[data-theme="dark"]{
    --bg: #101114;
    --ink: #f2f3f7;
    --ink-soft: #9298a6;
    --line: #2a2c33;
    --accent: #6f8dff;
    --accent-soft: rgba(111,141,255,0.12);
    --card: #17181d;
  }

  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter', sans-serif;
    -webkit-font-smoothing:antialiased;
    transition: background 0.25s ease, color 0.25s ease;
  }

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important; transition-duration:0.01ms !important;}
  }

  .theme-toggle{
    all:unset;
    box-sizing:border-box;
    position:fixed;
    top:24px;
    right:24px;
    width:40px;
    height:40px;
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--card);
    border:1px solid var(--line);
    color:var(--ink-soft);
    cursor:pointer;
    z-index:100;
    transition: border-color 0.18s ease, color 0.18s ease, transform 0.18s ease, background 0.25s ease;
  }
  .theme-toggle:hover, .theme-toggle:focus-visible{
    border-color: var(--accent);
    color: var(--accent);
    outline:none;
  }
  .theme-toggle:active{ transform: scale(0.92); }
  .theme-toggle .icon-moon{ display:none; }
  :root[data-theme="dark"] .theme-toggle .icon-sun{ display:none; }
  :root[data-theme="dark"] .theme-toggle .icon-moon{ display:block; }

  @media (max-width: 560px){
    .theme-toggle{ top:16px; right:16px; }
  }
  .wrap{
    max-width: 560px;
    margin: 0 auto;
    padding: 60px 24px 100px;
  }
  a.back{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    color:var(--ink-soft);
    text-decoration:none;
    display:inline-flex;
    align-items:center;
    gap:8px;
    margin-bottom:40px;
  }
  a.back:hover{ color:var(--accent); }

  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.12em;
    color:var(--accent);
    margin:0 0 14px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .eyebrow::before{ content:""; width:6px;height:6px;background:var(--accent);border-radius:50%; }

  h1{
    font-family:'Space Grotesk', sans-serif;
    font-size: clamp(28px, 5vw, 38px);
    font-weight:700;
    letter-spacing:-0.01em;
    margin:0 0 12px;
  }
  .lede{
    font-size:14.5px;
    line-height:1.65;
    color:var(--ink-soft);
    margin: 0 0 40px;
    max-width:48ch;
  }

  .list{ display:flex; flex-direction:column; gap:10px; }
  .row{
    display:flex;
    align-items:center;
    gap:14px;
    text-decoration:none;
    color:var(--ink);
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    padding:14px 16px;
    transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
  }
  .row:hover, .row:focus-visible{
    transform: translateY(-2px);
    border-color: var(--accent);
    background: var(--accent-soft);
    outline:none;
  }
  .row .mark{
    width:34px; height:34px; border-radius:9px;
    flex-shrink:0; display:flex; align-items:center; justify-content:center;
    font-family:'Space Grotesk', sans-serif; font-weight:600; font-size:13px; color:#fff;
    overflow:hidden;
  }
  .row .mark.mark-logo{ background:var(--card); border:1px solid var(--line); }
  .row .mark.mark-logo img{ width:100%; height:100%; object-fit:cover; display:block; }
  .row .text{ flex:1; min-width:0; }
  .row .name{ font-family:'Space Grotesk', sans-serif; font-weight:600; font-size:14.5px; margin-bottom:2px; }
  .row .cat{ font-size:12px; color:var(--ink-soft); }
  .row .arrow{ color:var(--ink-soft); font-family:'IBM Plex Mono', monospace; font-size:12px; flex-shrink:0; }
  .row:hover .arrow, .row:focus-visible .arrow{ color:var(--accent); }

  .empty{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    color:var(--ink-soft);
  }
</style>
</head>
<body>
  <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle dark mode" aria-pressed="false">
    <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><line x1="12" y1="2" x2="12" y2="4"></line><line x1="12" y1="20" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="6.34" y2="6.34"></line><line x1="17.66" y1="17.66" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="4" y2="12"></line><line x1="20" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="6.34" y2="17.66"></line><line x1="17.66" y1="6.34" x2="19.07" y2="4.93"></line></svg>
    <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
  </button>

  <div class="wrap">

    <a class="back" href="home-screen.html">← back to links</a>

    <p class="eyebrow">Legal</p>
    <h1>Privacy Policies</h1>
    <p class="lede">Every app and extension listed here, with a direct link to its privacy policy. Most currently share one general policy — that's expected until any app needs its own.</p>

    <div class="list" id="list">
      <p class="empty">Loading…</p>
    </div>

  </div>

<script>
  function setupThemeToggle(){
    const btn = document.getElementById('themeToggle');
    if(!btn) return;
    const root = document.documentElement;

    function updateButtonState(){
      const isDark = root.getAttribute('data-theme') === 'dark';
      btn.setAttribute('aria-pressed', String(isDark));
    }
    updateButtonState();

    btn.addEventListener('click', function(){
      const isDark = root.getAttribute('data-theme') === 'dark';
      const next = isDark ? 'light' : 'dark';
      root.setAttribute('data-theme', next);
      localStorage.setItem('lpt-theme', next);
      updateButtonState();
    });
  }
  setupThemeToggle();

  function escapeHtml(str){
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  fetch('data.json')
    .then(function(res){
      if(!res.ok) throw new Error('data.json not found (' + res.status + ')');
      return res.json();
    })
    .then(function(apps){
      const list = document.getElementById('list');
      if(!apps.length){
        list.innerHTML = '<p class="empty">No apps listed yet.</p>';
        return;
      }
      list.innerHTML = apps.map(function(app){
        const title = escapeHtml(app.title || "Untitled");
        const category = escapeHtml(app.category || "");
        const mark = escapeHtml((app.mark || "??").slice(0,2));
        const color = escapeHtml(app.color || "#8a8f98");
        const logo = escapeHtml(app.logo || "");
        const href = escapeHtml(app.privacyLink || "Privacy%20Policies/privacy-policy.pdf");
        const markHTML = logo
          ? `<span class="mark mark-logo" data-fallback-mark="${mark}" data-fallback-color="${color}"><img src="${logo}" alt="" class="logo-img"></span>`
          : `<span class="mark" style="background:${color};">${mark}</span>`;
        return `<a class="row" href="${href}">
          ${markHTML}
          <span class="text">
            <div class="name">${title}</div>
            <div class="cat">${category}</div>
          </span>
          <span class="arrow">→</span>
        </a>`;
      }).join('');

      document.querySelectorAll('.mark-logo img.logo-img').forEach(function(img){
        img.addEventListener('error', function(){
          const wrap = img.closest('.mark-logo');
          if(!wrap) return;
          wrap.classList.remove('mark-logo');
          wrap.style.background = wrap.dataset.fallbackColor || '#8a8f98';
          wrap.textContent = wrap.dataset.fallbackMark || '??';
        });
      });
    })
    .catch(function(err){
      document.getElementById('list').innerHTML =
        '<p class="empty">Couldn\'t load data.json — ' + escapeHtml(err.message) +
        '. If viewing this file directly, run it through server.py instead of double-clicking it.</p>';
      console.error(err);
    });
</script>

<!--
  This page reads data.json and lists every app with a link to its privacyLink field.
  Nothing to edit here directly — add/remove apps in data.json and this list updates itself.

  Dark/light mode uses the same 'lpt-theme' localStorage key as home-screen.html, so the
  choice made on one page carries over to this one automatically.
-->
</body>
</html>
