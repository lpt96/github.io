<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact</title>
<script>
  // Runs immediately, before the page paints, to avoid a flash of the wrong theme.
  // Defaults to the visitor's system preference unless they've picked a theme before.
  (function(){
    try {
      const saved = localStorage.getItem('lpt-theme');
      const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = saved || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    } catch(e) { /* if storage is blocked, just fall back to the default light theme */ }
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #fafafa;
    --ink: #0a0a0f;
    --ink-soft: #8a8f98;
    --line: #e4e4e7;
    --accent: #2e5eff;
    --card: #ffffff;
  }

  :root[data-theme="dark"]{
    --bg: #101114;
    --ink: #f2f3f7;
    --ink-soft: #9298a6;
    --line: #2a2c33;
    --accent: #6f8dff;
    --card: #17181d;
  }

  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter', sans-serif;
    -webkit-font-smoothing:antialiased;
    display:flex;
    justify-content:center;
    align-items:center;
    padding: 40px 20px;
    transition: background 0.25s ease, color 0.25s ease;
  }

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important; transition-duration:0.01ms !important;}
  }

  .theme-toggle{
    all:unset;
    box-sizing:border-box;
    position:fixed;
    top:24px;
    right:24px;
    width:40px;
    height:40px;
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--card);
    border:1px solid var(--line);
    color:var(--ink-soft);
    cursor:pointer;
    z-index:100;
    transition: border-color 0.18s ease, color 0.18s ease, transform 0.18s ease, background 0.25s ease;
  }
  .theme-toggle:hover, .theme-toggle:focus-visible{
    border-color: var(--accent);
    color: var(--accent);
    outline:none;
  }
  .theme-toggle:active{ transform: scale(0.92); }
  .theme-toggle .icon-moon{ display:none; }
  :root[data-theme="dark"] .theme-toggle .icon-sun{ display:none; }
  :root[data-theme="dark"] .theme-toggle .icon-moon{ display:block; }

  @media (max-width: 560px){
    .theme-toggle{ top:16px; right:16px; }
  }
  .wrap{ max-width: 460px; width:100%; text-align:center; }

  a.back{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    color:var(--ink-soft);
    text-decoration:none;
    display:inline-flex;
    align-items:center;
    gap:8px;
    margin-bottom:40px;
  }
  a.back:hover{ color:var(--accent); }

  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.12em;
    color:var(--accent);
    margin:0 0 14px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
  }
  .eyebrow::before{ content:""; width:6px;height:6px;background:var(--accent);border-radius:50%; }

  h1{
    font-family:'Space Grotesk', sans-serif;
    font-size: clamp(26px, 5vw, 32px);
    font-weight:700;
    letter-spacing:-0.01em;
    margin:0 0 16px;
  }
  p.lede{
    font-size:14.5px;
    line-height:1.65;
    color:var(--ink-soft);
    margin: 0 0 32px;
  }

  .email-card{
    border:1px solid var(--line);
    background:var(--card);
    border-radius:16px;
    padding:28px 24px;
  }
  .email-card .label{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--ink-soft);
    margin-bottom:10px;
  }
  .email-card a{
    font-family:'Space Grotesk', sans-serif;
    font-size:20px;
    font-weight:600;
    color:var(--accent);
    text-decoration:none;
    word-break:break-all;
  }
  .email-card a:hover{ text-decoration:underline; }
  .email-card .note{
    font-size:13px;
    color:var(--ink-soft);
    margin-top:14px;
    line-height:1.6;
  }
</style>
</head>
<body>
  <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle dark mode" aria-pressed="false">
    <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><line x1="12" y1="2" x2="12" y2="4"></line><line x1="12" y1="20" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="6.34" y2="6.34"></line><line x1="17.66" y1="17.66" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="4" y2="12"></line><line x1="20" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="6.34" y2="17.66"></line><line x1="17.66" y1="6.34" x2="19.07" y2="4.93"></line></svg>
    <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
  </button>

  <div class="wrap">

    <a class="back" href="home-screen.html">← back to links</a>

    <p class="eyebrow">Get in touch</p>
    <h1>Contact</h1>
    <p class="lede">For support or assistance with any app or extension, or any other questions, reach out here:</p>

    <div class="email-card">
      <div class="label">Email</div>
      <a href="mailto:lpt_studio@icloud.com">lpt_studio@icloud.com</a>
      <p class="note">Please mention which app or extension you're writing about — it helps route things faster.</p>
    </div>

  </div>

<script>
  function setupThemeToggle(){
    const btn = document.getElementById('themeToggle');
    if(!btn) return;
    const root = document.documentElement;

    function updateButtonState(){
      const isDark = root.getAttribute('data-theme') === 'dark';
      btn.setAttribute('aria-pressed', String(isDark));
    }
    updateButtonState();

    btn.addEventListener('click', function(){
      const isDark = root.getAttribute('data-theme') === 'dark';
      const next = isDark ? 'light' : 'dark';
      root.setAttribute('data-theme', next);
      localStorage.setItem('lpt-theme', next);
      updateButtonState();
    });
  }
  setupThemeToggle();
</script>

<!--
  HOW TO EDIT
  ===========
  - Swap lpt_studio@icloud.com if this address ever changes.
  - This one address currently covers everything: support requests, general
    questions, and business/press inquiries. If any of those ever needs its own
    address (e.g. a separate press@ or business@), just duplicate the .email-card
    block and give it its own label.

  Dark/light mode uses the same 'lpt-theme' localStorage key as home-screen.html and
  privacy-policies.html, so the choice made on any of these pages carries over to the others.
-->
</body>
</html>
